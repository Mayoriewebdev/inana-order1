<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Food Company</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    
</head>

<body>


   <section class="order-section">

  <!-- LOGO -->
  <div class="logo" data-aos="fade-down">
    <img src="images/Logo.png" alt="Logo">
  </div>

  <!-- HEADER IMAGE -->
  <div class="order-header" data-aos="fade-up" data-aos-delay="200">
    <img src="images/Your order text.png" alt="Header">
  </div>

  <!-- STEPS -->
  <div class="steps" data-aos="zoom-in" data-aos-delay="300">
    <div class="step active">1</div>
    <div class="line active"></div>
    <div class="step">2</div>
    <div class="line"></div>
    <div class="step">3</div>
  </div>

  <!-- PRODUCTS -->
  <div class="products">

    <!-- PRODUCT 1 -->
    <div class="product-card active" onclick="selectProduct(this)" 
         data-aos="fade-up" data-aos-delay="400">

      <a href="https://mayoriewebdev.github.io/inanaorder2/">
          <div class="product-info">
            <img src="images/Inana mayo tex.png" class="title-img">
            <img src="images/From.png" class="price-img">
          </div>
        </a>

      <div class="radio active"></div>
    </div>

    <!-- PRODUCT 2 -->
    <div class="product-card" onclick="selectProduct(this)" 
         data-aos="fade-up" data-aos-delay="500">

      <div class="product-info">
        <img src="images/Pure oil.png" class="title-imgs">
        <img src="images/From 18,000.png" class="price-img">
      </div>

      <div class="radio"></div>
    </div>

  </div>

</section>


<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 1000,
    once: true
  });
</script>




<script>
function selectProduct(card) {
  // remove active from all
  document.querySelectorAll(".product-card").forEach(c => {
    c.classList.remove("active");
    c.querySelector(".radio").classList.remove("active");
  });

  // activate clicked
  card.classList.add("active");
  card.querySelector(".radio").classList.add("active");
}
</script>



</body>

</html>
